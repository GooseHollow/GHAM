name: pythonapp

on:
  schedule:
    - cron: '05 12 * * 1-5' #run at 8 EST every weekday

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo content
        uses: actions/checkout@main # checkout the repository content to github runner.
        
      - name: setup python
        uses: actions/setup-python@main
        with:
          python-version: 3.8 #install the python needed
          
      - name: install packages
        run: |
          python -m pip install requests
          
      - name: execute py script # run the run.py to get the latest data
        run: |
          python ./test.py
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }} # if run.py requires passwords..etc, set it as secrets
          API_PASSWORD: ${{ secrets.API_PASSWORD }} # if run.py requires passwords..etc, set it as secrets
      
      - name: Commit files
        id: commit
        run: |
          git config --local user.name actions-user
          git config --local user.email "actions@github.com"
          git add assets/js/*
          git add assets/old_cache.txt
          git pull
          git status
          if git diff --cached --quiet; then
            echo "No new data from API, skipping commit."
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "GH ACTION Headlines $(date)"
            git push origin main
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify GChat - Data Updated
        if: steps.commit.outputs.updated == 'true'
        run: |
          curl -s -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "✅ GHTA daily update succeeded — new fund data published to gham.co"}'

      - name: Notify GChat - No New Data
        if: steps.commit.outputs.updated == 'false'
        run: |
          curl -s -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "⚠️ GHTA daily update ran but ETFG API had no new data. Site unchanged."}'

      - name: Notify GChat - Failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "❌ GHTA daily update FAILED. Check workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
