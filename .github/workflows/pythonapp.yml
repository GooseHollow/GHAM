name: pythonapp

on:
  schedule:
    - cron: '30 11 * * 1-5' #run at 8:30 EST every weekday

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo content
        uses: actions/checkout@main # checkout the repository content to github runner.
        
      - name: setup python
        uses: actions/setup-python@main
        with:
          python-version: 3.8 #install the python needed
          
      - name: install packages
        run: |
          python -m pip install requests
          
      - name: execute py script # run the run.py to get the latest data
        run: |
          python ./test.py
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }} # if run.py requires passwords..etc, set it as secrets
          API_PASSWORD: ${{ secrets.API_PASSWORD }} # if run.py requires passwords..etc, set it as secrets
      
      - name: Commit files
        run: |
          git config --local user.name actions-user
          git config --local user.email "actions@github.com"
          git add assets/js/*
          git add assets/old_cache.txt
          git pull
          git status
          if git diff --cached --quiet; then
            echo "No new data from API, skipping commit."
          else
            git commit -m "GH ACTION Headlines $(date)"
            git push origin main
          fi

      - name: Notify Google Chat on Success
        if: success()
        run: |
          curl -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "✅ *pythonapp* workflow succeeded.\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

      - name: Notify Google Chat on Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.GCHAT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "❌ *pythonapp* workflow failed.\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
